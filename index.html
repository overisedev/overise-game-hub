<!-- InitiateCheckout handler + UTM passthrough -->
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src','sck','xcod'];
  var utmParams = new URLSearchParams();
  utmKeys.forEach(function(key){
    if(params.has(key)) utmParams.set(key, params.get(key));
  });
  params.forEach(function(value, key){
    var k = key.toLowerCase();
    if(k.indexOf('utm_') === 0 || k === 'fbclid'){
      utmParams.set(key, value);
    }
  });
  var utmString = utmParams.toString();
  if(utmString){
    document.cookie = 'overise_utms=' + encodeURIComponent(utmString) + ';path=/;max-age=1800;SameSite=Lax';
    try { sessionStorage.setItem('overise_utms', utmString); } catch(e){}
  } else {
    document.cookie = 'overise_utms=;path=/;max-age=0;SameSite=Lax';
    try { sessionStorage.removeItem('overise_utms'); } catch(e){}
  }
  function getUtms(){
    if(utmString) return utmString;
    var match = document.cookie.match(/overise_utms=([^;]+)/);
    if(match) return decodeURIComponent(match[1]);
    try { return sessionStorage.getItem('overise_utms') || ''; } catch(e){ return ''; }
  }
  function appendUtms(url){
    var u = getUtms();
    if(!u) return url;
    if(url.indexOf('utm_source') !== -1) return url;
    var sep = url.indexOf('?') !== -1 ? '&' : '?';
    return url + sep + u;
  }
  function updateCheckoutLinks(){
    var links = document.querySelectorAll('a[href*="ggcheckout.com"]');
    for(var i = 0; i < links.length; i++){
      links[i].setAttribute('href', appendUtms(links[i].getAttribute('href')));
    }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', updateCheckoutLinks);
  } else {
    updateCheckoutLinks();
  }
  setTimeout(updateCheckoutLinks, 1000);
  window.fireICAndRedirect = function(e){
    e.preventDefault();
    var url = appendUtms(e.currentTarget.href);
    if(typeof fbq === 'function'){
      fbq('track','InitiateCheckout',{value:9.97,currency:'BRL'});
    }
    setTimeout(function(){ window.location.href = url; }, 800);
  };
})();
</script>
